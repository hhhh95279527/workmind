version: '3.9'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: workmind-server
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ZHIPU_API_KEY=${ZHIPU_API_KEY:-}
      - CHROMA_URL=http://chroma:8000
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost}
      - CACHE_TTL=${CACHE_TTL:-1800000}
    depends_on:
      chroma:
        condition: service_started
    volumes:
      - ./server/uploads:/app/uploads
    networks:
      - workmind-net

  chroma:
    image: chromadb/chroma:latest
    container_name: workmind-chroma
    restart: unless-stopped
    volumes:
      - chroma-data:/chroma/chroma
    networks:
      - workmind-net

  nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: workmind-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - workmind-net

volumes:
  chroma-data:

networks:
  workmind-net:
    driver: bridge
